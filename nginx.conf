user  root;
worker_processes  1;

events {
    worker_connections  1024;
}

http {
    include       mime.types;
    default_type  application/octet-stream;
    
    # 开启 Gzip 压缩，加快内网访问速度
    gzip on;
    gzip_min_length 1k;
    gzip_types text/plain application/javascript application/x-javascript text/css application/xml text/javascript;

    server {
        listen 80;  # 容器对外暴露的统一端口
        server_name localhost;

        # 1. 前端静态资源 (Vue 编译产物)
        location / {
            root   /app/web/dist;
            index  index.html index.htm;
            # 解决 Vue Router History 模式刷新 404 问题
            try_files $uri $uri/ /index.html; 
        }

        # 2. ningbopoc接口反向代理（必须在 /api/ 之前，因为前缀匹配中更长的优先）
        # 匹配以 /api/ningbopoc/ 开头的请求，转发到外部服务器
        location /api/ningbopoc/ {
            # 转发到外部服务器 10.0.0.28:8080/api
            # 注意：proxy_pass 以 /api 结尾（不带斜杠），会保留 /api 前缀，去掉 /ningbopoc
            # 例如：/api/ningbopoc/xxx -> http://10.0.0.28:8080/api/xxx
            proxy_pass http://10.0.0.28:8080/api/ningbopoc/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            
            # 支持跨域（如果需要）
            add_header Access-Control-Allow-Origin *;
            add_header Access-Control-Allow-Methods 'GET, POST, OPTIONS, PUT, DELETE';
            add_header Access-Control-Allow-Headers 'DNT,User-Agent,X-Requested-With,If-Modified-Since,Cache-Control,Content-Type,Range';
            
            # 超时设置
            proxy_connect_timeout 60s;
            proxy_send_timeout 60s;
            proxy_read_timeout 60s;
        }

        # 3. 后端 API 反向代理（默认，匹配其他所有 /api/ 请求）
        # 假设前端发起的请求都以 /api 开头
        location /api/ {
            # 转发给容器内的后端服务 (端口 8001)
            # 注意：使用 /api/ 结尾，这样会保留 /api 前缀
            proxy_pass http://127.0.0.1:8001/api/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            
            # 支持SSE（Server-Sent Events）流式响应
            proxy_buffering off;
            proxy_cache off;
            proxy_read_timeout 86400s;  # 长连接超时时间
            proxy_send_timeout 86400s;
            
            # 支持WebSocket
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
        }

        # 4. 挡板服务反向代理
        # 假设挡板服务的请求以 /mock/ 开头
        location /mock/ {
            # 转发给容器内的挡板服务 (端口 8082)
            proxy_pass http://127.0.0.1:8082/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }
        
        # 5. WebSocket端点（如果需要）
        location /ws/ {
            proxy_pass http://127.0.0.1:8001/ws/;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            
            # WebSocket连接保持
            proxy_read_timeout 86400s;
            proxy_send_timeout 86400s;
        }
    }
}
